services:
  fcam:
    build: .
    ports:
      # 默认只绑定本机，避免在服务器上误把控制面暴露到公网；如需对外暴露可设 FCAM_BIND_ADDR=0.0.0.0
      - "${FCAM_BIND_ADDR:-127.0.0.1}:8000:8000"
    environment:
      FCAM_ADMIN_TOKEN: "${FCAM_ADMIN_TOKEN:-dev_admin_token}"
      FCAM_MASTER_KEY: "${FCAM_MASTER_KEY:-dev_master_key_32_bytes_minimum____}"
      FCAM_CONFIG: "/app/config.yaml"
    volumes:
      - "./data:/app/data"

  # 对外暴露“数据面”端口；控制面（/admin/*）被禁用
  fcam_public:
    profiles: ["public"]
    build: .
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      # 只跑数据面时不要求 FCAM_ADMIN_TOKEN，但必须提供稳定的 FCAM_MASTER_KEY
      FCAM_MASTER_KEY: "${FCAM_MASTER_KEY:-change_me_master_key_32_bytes_minimum____}"
      FCAM_CONFIG: "/app/config.yaml"
      FCAM_SERVER__ENABLE_DATA_PLANE: "true"
      FCAM_SERVER__ENABLE_CONTROL_PLANE: "false"
      FCAM_SERVER__ENABLE_DOCS: "false"
    volumes:
      - "./data:/app/data"

  postgres:
    profiles: ["prod"]
    image: "postgres:16-alpine"
    environment:
      POSTGRES_USER: "fcam"
      POSTGRES_PASSWORD: "fcam_password"
      POSTGRES_DB: "fcam"
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcam -d fcam"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    profiles: ["prod"]
    image: "redis:7-alpine"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 生产示例：数据面（/api）对外暴露 8000；控制面禁用
  fcam_api:
    profiles: ["prod"]
    build: "."
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      FCAM_SERVER__PORT: "8000"
      FCAM_SERVER__ENABLE_DATA_PLANE: "true"
      FCAM_SERVER__ENABLE_CONTROL_PLANE: "false"
      FCAM_SERVER__ENABLE_DOCS: "false"

      FCAM_DATABASE__URL: "postgresql+psycopg://fcam:fcam_password@postgres:5432/fcam"

      FCAM_MASTER_KEY: "${FCAM_MASTER_KEY:-change_me_master_key_32_bytes_minimum____}"
      FCAM_STATE__MODE: "redis"
      FCAM_STATE__REDIS__URL: "redis://redis:6379/0"

      FCAM_OBSERVABILITY__METRICS_ENABLED: "true"

  # 生产示例：控制面（/admin）仅绑定 127.0.0.1:8001；数据面禁用
  fcam_admin:
    profiles: ["prod"]
    build: "."
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      FCAM_SERVER__PORT: "8001"
      FCAM_SERVER__ENABLE_DATA_PLANE: "false"
      FCAM_SERVER__ENABLE_CONTROL_PLANE: "true"
      FCAM_SERVER__ENABLE_DOCS: "false"

      FCAM_DATABASE__URL: "postgresql+psycopg://fcam:fcam_password@postgres:5432/fcam"

      FCAM_ADMIN_TOKEN: "${FCAM_ADMIN_TOKEN:-change_me_admin_token}"
      FCAM_MASTER_KEY: "${FCAM_MASTER_KEY:-change_me_master_key_32_bytes_minimum____}"
      FCAM_STATE__MODE: "redis"
      FCAM_STATE__REDIS__URL: "redis://redis:6379/0"

      FCAM_OBSERVABILITY__METRICS_ENABLED: "true"

volumes:
  pgdata:
