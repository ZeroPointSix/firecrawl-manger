server:
  host: "0.0.0.0"
  port: 8000
  trust_proxy_headers: false
  enable_docs: true
  enable_data_plane: true
  enable_control_plane: true

firecrawl:
  # 建议：使用上游 root base url（不包含 /v1 或 /v2），由 FCAM 按入站路径追加版本前缀：
  # - /api/* 与 /v1/* → 上游 /v1/*
  # - /v2/*           → 上游 /v2/*
  # 兼容：也可配置为以 /v1 或 /v2 结尾（FCAM 会自动去重，避免 /v1/v1 或 /v1/v2）
  base_url: "https://api.firecrawl.dev"
  timeout: 30
  max_retries: 3
  failure_threshold: 3
  failure_window_seconds: 60
  failed_cooldown_seconds: 60

security:
  client_auth:
    enabled: true
    scheme: "bearer" # bearer | mtls（MVP 默认 bearer）
  admin:
    token_env: "FCAM_ADMIN_TOKEN"
  key_encryption:
    master_key_env: "FCAM_MASTER_KEY"
  request_limits:
    max_body_bytes: 1048576 # 1MB
    allowed_paths: ["scrape", "crawl", "search", "agent", "map", "extract", "batch", "browser", "team"]

quota:
  # 文档冻结：quota.timezone=UTC；quota.count_mode=success
  timezone: "UTC"
  count_mode: "success" # success | attempt
  default_daily_limit: 5
  reset_time: "00:00"
  enable_quota_check: true

rate_limit:
  cooldown_seconds: 60

credit_monitoring:
  enabled: true

  smart_refresh:
    enabled: true
    high_usage_interval: 15
    medium_usage_interval: 30
    normal_usage_interval: 60
    low_usage_interval: 120

  fixed_refresh:
    interval_minutes: 60

  batch_size: 10
  batch_delay_seconds: 5

  local_estimation:
    enabled: true
    sync_on_request: true

  retention_days: 90
  retry_delay_minutes: 10
  refresh_check_interval_seconds: 300
  min_manual_refresh_interval_seconds: 300
  history_max_limit: 500

idempotency:
  enabled: true
  ttl_seconds: 86400 # 24h
  max_response_bytes: 1048576 # 1MB
  require_on: [] # e.g. ["crawl", "agent"] to enforce header

database:
  path: "./data/api_manager.db"

logging:
  level: "INFO"
  format: "json" # json | plain
  redact_fields: ["authorization", "api_key", "token", "cookie", "set-cookie"]

observability:
  metrics_enabled: false
  metrics_path: "/metrics"
  retention:
    request_logs_days: 30
    audit_logs_days: 90

state:
  mode: "memory" # memory | redis
  redis:
    url: "redis://localhost:6379/0"
    key_prefix: "fcam"

control_plane:
  # 批量 key test 的并发上限（用于避免大量 keys 顺序测试导致请求/前端超时）
  batch_key_test_max_workers: 10
