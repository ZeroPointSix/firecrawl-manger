services:
  fcam:
    build: .
    ports:
      # 对外暴露“数据面”端口；控制面（/admin/*）被禁用
      - "0.0.0.0:8000:8000"
    environment:
      # 只跑数据面时不要求 FCAM_ADMIN_TOKEN，但必须提供稳定的 FCAM_MASTER_KEY
      FCAM_MASTER_KEY: "${FCAM_MASTER_KEY:?please set FCAM_MASTER_KEY in your environment or .env}"
      FCAM_CONFIG: "/app/config.yaml"
      FCAM_SERVER__ENABLE_DATA_PLANE: "true"
      FCAM_SERVER__ENABLE_CONTROL_PLANE: "false"
      FCAM_SERVER__ENABLE_DOCS: "false"
    volumes:
      - "./data:/app/data"
