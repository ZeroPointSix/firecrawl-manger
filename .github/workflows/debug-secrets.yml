name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  check-secrets:
    name: 检查 Secrets 配置
    runs-on: ubuntu-latest

    steps:
    - name: 检查 DOCKER_USERNAME 是否存在
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
          echo "❌ DOCKER_USERNAME 未设置或为空"
          exit 1
        else
          echo "✅ DOCKER_USERNAME 已设置"
          echo "用户名长度: ${#DOCKER_USERNAME}"
        fi
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    - name: 检查 DOCKER_PASSWORD 是否存在
      run: |
        if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo "❌ DOCKER_PASSWORD 未设置或为空"
          exit 1
        else
          echo "✅ DOCKER_PASSWORD 已设置"
          echo "密码长度: ${#DOCKER_PASSWORD}"
        fi
      env:
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    - name: 测试 Docker 登录
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 验证登录成功
      run: |
        echo "✅ Docker 登录成功！"
        docker info | grep Username || echo "未找到用户名信息"
